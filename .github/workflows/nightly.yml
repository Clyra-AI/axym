name: nightly

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  risk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
      - run: mkdir -p .tmp && go build -o .tmp/axym ./cmd/axym
      - run: govulncheck -mode=binary .tmp/axym
      - run: make test-security
      - run: make test-scenarios
      - run: make test-hardening
      - run: make test-chaos
      - run: make test-perf
      - run: make test-docs-links
