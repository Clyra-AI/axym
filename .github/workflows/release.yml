name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      attestations: write
      artifact-metadata: write
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: make prepush
      - name: Go lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.0.1
      - run: go install github.com/securego/gosec/v2/cmd/gosec@v2.24.7
      - run: echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Security scan
        run: make test-security
      - run: make test-scenarios
      - run: make test-docs-consistency
      - run: make test-docs-storyline
      - name: Docs links
        run: make test-docs-links
      - name: Build
        uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.14.1
          args: release --clean --skip publish
      - name: Verify checksums
        run: sha256sum -c dist/checksums.txt
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          artifact-name: axym.spdx.json
          path: dist
      - name: Normalize SBOM path
        run: |
          sbom_path="$(find . -maxdepth 2 -name '*.spdx.json' | head -n 1)"
          test -n "${sbom_path}"
          cp "${sbom_path}" dist/axym.spdx.json
      - name: Build scanner target
        run: mkdir -p .tmp && go build -o .tmp/axym ./cmd/axym
      - name: Vulnerability scan
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4 && govulncheck -mode=binary .tmp/axym
      - name: Sign
        uses: sigstore/cosign-installer@v4.1.0
      - name: Sign checksums
        run: cosign sign-blob --yes --output-signature dist/checksums.txt.sig --output-certificate dist/checksums.txt.pem dist/checksums.txt
      - name: Provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/**"
      - name: Record provenance receipt
        run: |
          printf '{"builder":"github-actions","tag":"%s","subject":"dist/**"}\n' "${GITHUB_REF_NAME}" > dist/github-attestation.provenance.json
      - name: Build release smoke binary
        run: go build -o .tmp/axym-release-smoke ./cmd/axym
      - name: Verify release integrity
        run: ./scripts/release_go_nogo.sh --dist-dir dist --binary-name axym --release-binary .tmp/axym-release-smoke
      - name: Publish verified artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "${TAG}" >/dev/null 2>&1 || gh release create "${TAG}" --title "${TAG}" --notes ""
          mapfile -t files < <(find dist -maxdepth 1 -type f -print)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no release artifacts found in dist/"
            exit 1
          fi
          gh release upload "${TAG}" "${files[@]}" --clobber
